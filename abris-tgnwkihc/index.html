 function openlb(cell,i){try{items=JSON.parse(cell.getAttribute('data-media'));}catch(e){items=[];}if(!items.length)return;idx=i;lb.classList.add('open');rlb();}
 function closelb(){lb.classList.remove('open');stage.innerHTML='';}
 function move(d){idx=(idx+d+items.length)%items.length;rlb();}
 document.querySelectorAll('.c-media').forEach(function(cell){cell.querySelectorAll('.thumb').forEach(function(t){t.addEventListener('click',function(){openlb(cell,+t.getAttribute('data-i'));});});});
 document.getElementById('lbClose').onclick=closelb;document.getElementById('lbNext').onclick=function(){move(1);};document.getElementById('lbPrev').onclick=function(){move(-1);};
 lb.addEventListener('click',function(e){if(e.target===lb)closelb();});
 document.addEventListener('keydown',function(e){if(!lb.classList.contains('open'))return;if(e.key==='Escape')closelb();if(e.key==='ArrowRight')move(1);if(e.key==='ArrowLeft')move(-1);});
